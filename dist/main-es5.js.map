<div *ngFor="let item of challenge">
    <app-evaluate-item [currentChal]="item"></app-evaluate-item>
</div>
<div *ngIf="challenge.length === 0">
    <span class="d-flex justify-content-center" style="padding-top: 5%;">
<img src="../../../assets/imgs/demons.png" style="width: 50%;">
</span>
    <span class="d-flex justify-content-center" style="padding-top: 5%;">
<h5>No challenge to display. Click on the top right button to create a challenge</h5>
</span>
</div>
