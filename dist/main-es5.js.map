<body>
    <div class="bg-white">
        <div class="container">
            <div class="row justify-content-center align-items-center d-flex vh-100">
                <div class="col-md-4 mx-auto">
                    <div class="osahan-login py-4">
                        <div class="text-center mb-4">
                            <a href=""><img src="../../../assets/img/log.png" alt="" style="max-height: 100px;"></a>
                            <h5 class="font-weight-bold mt-3">First, let's find your account</h5>
                            <p class="text-muted">An email will be sent to you to reset your password
                            </p>
                        </div>
                        <div *ngIf="sent" class="alert alert-success">
                          Password reset email sent to <strong>{{mail}}</strong>. Check your inbox and spam folder.
                        </div>
                        <form #templateVariableName="ngForm" (ngSubmit)="reset()" *ngIf="!sent">
                            <div class="form-group">
                                <label class="mb-1">Email</label>
                                <div class="position-relative icon-form-control">
                                    <i class="feather-user position-absolute"></i>
                                    <input required type="email" name="mail" class="form-control" [(ngModel)]="mail">
                                </div>
                            </div>
                            <button class="btn btn-primary btn-block text-uppercase" type="submit" [disabled]="loading || !mail">
                              <span *ngIf="!loading">Send reset email</span>
                              <span *ngIf="loading">Sending...</span>
                            </button>
                            <div class="py-3 d-flex align-item-center">
                                <a [routerLink]="['/sign-in']">Sign In</a>
                                <span class="ml-auto"> New to RichBlok? <a class="font-weight-bold" [routerLink]="['/register']">Join now</a></span>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
