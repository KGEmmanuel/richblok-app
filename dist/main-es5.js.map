<div class="border">
  <form class="px-4 py-3">
    <div class="row">
      <div class="form-group col-lg-6">
        <label for="exampleDropdownFormEmail1">Training Diploma</label>
        <input type="text" name="name" class="form-control" id="exampleDropdownFormEmail1" placeholder="Enter the name of your training">
     </div>
     <div class="form-group col-lg-6">
      <label for="exampleDropdownFormEmail1">Training Domain</label>
      <input type="text" name="domain" class="form-control" id="exampleDropdownFormEmail1" placeholder="Enter the domain of your training">
   </div>
    </div>


     <div class="form-group">
        <label for="exampleDropdownFormPassword1">Training center</label>
        <input type="text" name="company" class="form-control" id="exampleDropdownFormPassword1" placeholder="Enter the name of your training center">
     </div>
     <div class="form-group row">
        <div class="form-group col-lg-6" >
        <label for="exampleDropdownFormPassword1">From</label>
        <input type="date" name="detadeb" class="form-control" id="exampleDropdownFormPassword1">
     </div>
     <div class="form-group col-lg-6" >
      <label for="exampleDropdownFormPassword1">To</label>
      <input type="date" name="datefin" class="form-control" id="exampleDropdownFormPassword1">
   </div>
     </div>
     <div class="form-check mb-3">

        <input type="checkbox" class="form-check-input" id="dropdownCheck">
        <label class="form-check-label" for="dropdownCheck">
       Currently on it?
        </label>

     </div>
     <div class="form-group row">
      <label for="exampleDropdownFormPassword1">Description</label>
      <textarea type="date" name="detadeb" placeholder="Describe your training in few words" class="form-control" id="exampleDropdownFormPassword1"></textarea>
   </div>

 <div class="d-flex justify-content-end">
  <button type="button" class="btn btn-outline-primary btn-sm"> Save </button>

 </div>
  </form>
</div>
