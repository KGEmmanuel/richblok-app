<div class="um-overlay" *ngIf="open" (click)="dismiss()">
  <div class="um-modal" (click)="$event.stopPropagation()">
    <button type="button"
            *ngIf="canDismiss"
            class="um-close"
            (click)="dismiss()"
            aria-label="Close">×</button>

    <div class="um-tag">⭐ Pro</div>

    <h2 class="um-title">{{ title }}</h2>
    <p class="um-sub">{{ sub }}</p>

    <div class="um-annual-toggle">
      <button type="button" [class.active]="!annualBilling" (click)="annualBilling = false">Monthly</button>
      <button type="button" [class.active]="annualBilling" (click)="annualBilling = true">
        Yearly <span class="um-save">-30%</span>
      </button>
    </div>

    <div class="um-price">
      <span class="um-price-main">{{ priceLabel }}</span>
      <span class="um-price-period">{{ pricePeriod }}</span>
    </div>

    <ul class="um-features">
      <li *ngFor="let f of features">✓ {{ f }}</li>
    </ul>

    <button type="button" class="um-cta" (click)="upgrade()" [disabled]="loading">
      <span *ngIf="!loading">Upgrade to Pro →</span>
      <span *ngIf="loading">Opening checkout…</span>
    </button>
    <p class="um-guarantee">🛡 30-day money-back guarantee · Cancel anytime</p>

    <button type="button"
            *ngIf="canDismiss"
            class="um-later"
            (click)="dismiss()">Maybe later</button>
    <p *ngIf="!canDismiss" class="um-wait-hint">
      This prompt can be dismissed in a moment…
    </p>
  </div>
</div>
