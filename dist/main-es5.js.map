<div class="d-flex align-items-center osahan-post-header mb-3 people-list">
  <div class="dropdown-list-image mr-3">
     <img class="rounded-circle" [src]="currentUser.imageprofil" alt="">
     <div class="status-indicator bg-success"></div>
  </div>
  <div class="font-weight-bold mr-2">
     <div class="text-truncate">{{currentUser.nom}} {{currentUser.prenom}}</div>
     <div class="small text-gray-500">{{currentUser.poste}} at {{currentUser.lieu}}
     </div>
  </div>
  <span class="ml-auto"><button type="button" class="btn btn-light btn-sm" (click)="askconnection()"><i class="feather-user-plus"></i></button>
  </span>
</div>
