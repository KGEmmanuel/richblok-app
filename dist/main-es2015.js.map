<div class="box shadow-sm border rounded bg-white mb-3">
    <div class="box-title border-bottom p-3">
        <h6 class="m-0">Jobs
        </h6>
    </div>
    <div class="box-body p-3 scrollbar bg-white box border" style="max-height: 400px; width: 100%;" id="style">
        <div *ngFor="let job of allJobs" class="force-overflow">
            <app-jobs-item [currentJob]="job"></app-jobs-item>
        </div>
    </div>
</div>
