name: Build & Deploy

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master]

jobs:
  build:
    name: Build Angular app
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 14 (Angular 9 requirement)
        uses: actions/setup-node@v4
        with:
          node-version: '14'

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm install --legacy-peer-deps
        env:
          NODE_OPTIONS: --openssl-legacy-provider

      - name: Build production
        run: npx ng build --prod
        env:
          NODE_OPTIONS: --openssl-legacy-provider --max_old_space_size=4096

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist/
          retention-days: 7

  test:
    name: Run unit tests
    runs-on: ubuntu-latest
    if: false  # Disabled until karma config is migrated to ChromeHeadless
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '14' }
      - run: npm install --legacy-peer-deps
      - run: npx ng test --no-watch --browsers=ChromeHeadless
        env:
          NODE_OPTIONS: --openssl-legacy-provider

  deploy-firebase-functions:
    name: Deploy Cloud Functions
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '18' }
      - name: Install functions dependencies
        run: cd functions && npm install
      - name: Build functions
        run: cd functions && npm run build
      - name: Deploy to Firebase
        if: env.FIREBASE_TOKEN != ''
        run: npx firebase-tools deploy --only functions,firestore:rules,firestore:indexes --token "$FIREBASE_TOKEN"
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

  notify-railway:
    name: Notify Railway (auto-deploys via GitHub integration)
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    steps:
      - run: echo "Railway auto-deploys from master via the GitHub integration. No action needed here."
