<div class="p-3 d-flex align-items-center  border-bottom osahan-post-header">
  <div class="font-weight-bold mr-1 overflow-hidden">
     <div class="text-truncate">{{userName}}
     </div>
  </div>
  <span class="ml-auto">
     <button type="button" class="btn btn-light btn-sm rounded" routerLink="/video-chat">
     <i class="feather-video"></i>
     </button>
     <div class="btn-group">
        <button type="button" class="btn btn-light btn-sm rounded" data-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
        <i class="feather-more-vertical"></i>
        </button>
        <div class="dropdown-menu dropdown-menu-right">
           <button class="dropdown-item" type="button"><i class="feather-trash"></i> Delete</button>
           <button class="dropdown-item" type="button"><i class="feather-x-circle"></i> Turn Off</button>
        </div>
     </div>
  </span>
</div>
<div class="osahan-chat-box p-3 border-top border-bottom bg-light" id="style">
  <div class="force-overflow">
    <app-chat-content-item *ngFor="let item of messages" [message]="item" (selUsername)="onnameSel($event)" (selPhoto)="onPhotoSel($event)"></app-chat-content-item>
  </div>
</div>
<div class="input-group mb-3" style="padding-top: 2%;">
  <div class="input-group-prepend smile">
    <button class="btn btn-outline-secondary" type="button" popoverClass="my-custom-class" id="button-addon2" ><i class="fa fa-smile" style="color: rgb(11, 91, 97); font-size: larger;"></i></button>
 </div>
  <input type="text" class="form-control" placeholder="Enter you comment" aria-describedby="button-addon2">
  <div class="input-group-append">
     <button class="btn btn-outline-secondary" type="button" id="button-addon2"><i class="feather-send"></i> Send</button>
  </div>
</div>

<div class="d-flex justify-content-end">
  <div class="overflow-hidden">
     <button type="button" class="btn btn-light btn-sm rounded">
     <i class="feather-image"></i>
     </button>
     <button type="button" class="btn btn-light btn-sm rounded">
     <i class="feather-paperclip"></i>
     </button>
     <button type="button" class="btn btn-light btn-sm rounded">
     <i class="feather-camera"></i>
     </button>
  </div>
</div>
