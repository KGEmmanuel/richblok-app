        <div>
            <span class="d-flex justify-content-center" style="padding-top: 10%;">
<img src="../../../../assets/imgs/feed2.png" style="width: 60%;">
</span>
            <span class="d-flex justify-content-center" style="padding-top: 5%;">
<span class="d-flex justify-content-center" style="padding-left: 5%;">

</span>
            </span>
        </div>
    </div>
