<rb-app-shell active="challenges">
  <section class="ev-hero">
    <rb-eyebrow>Challenges</rb-eyebrow>
    <h1 class="ev-h1">Take a challenge · earn a verified badge</h1>
    <p class="ev-sub">
      Pick a skill, beat the pass threshold, and your badge shows up on your public profile —
      with your STAR stories and AI-pair verification auto-attached.
    </p>
    <div class="ev-hero-cta">
      <a routerLink="/create-challenge" class="ev-hero-link">
        <rb-icon name="plus" size="16" /> Create a challenge
      </a>
      <a routerLink="/ai-pair/ai-pair-rate-limit-bug" class="ev-hero-link">
        <rb-icon name="bot" size="16" /> Try an AI-pair challenge
      </a>
    </div>
  </section>

  <rb-card>
    <rb-card-title>All challenges</rb-card-title>
    <app-evaluate-list></app-evaluate-list>
  </rb-card>
</rb-app-shell>

<app-upgrade-modal
  [open]="upgradeOpen"
  [trigger]="upgradeTrigger"
  (closed)="onUpgradeClosed()">
</app-upgrade-modal>
