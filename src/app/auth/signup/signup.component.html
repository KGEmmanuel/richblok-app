<body>
    <div style="height: 100%;">
        <div class="container">
            <div class="row justify-content-center align-items-center d-flex vh-100">
                <div class="col-md-4 mx-auto">
                    <div class="osahan-login py-4">
                        <div class="text-center mb-4">
                            <a href=""><img src="../../../assets/img/log.png" alt="" style="max-height: 100px;"></a>
                            <h5 class="font-weight-bold mt-3">Join RichBlok</h5>
                            <p class="text-muted">Make the most of your professional life</p>
                        </div>

                        <form *ngIf="step === 1" action="index.html" #xpForm="ngForm" (ngSubmit)="next()">
                            <div class="form-row">
                                <div class="col">
                                    <div class="form-group">
                                        <label class="mb-1">First name</label>
                                        <div class="position-relative icon-form-control">
                                            <i class="feather-user position-absolute"></i>
                                            <input required type="text" class="form-control" [(ngModel)]="user.nom">
                                        </div>
                                    </div>
                                </div>
                                <div class="col">
                                    <div class="form-group">
                                        <label class="mb-1">Last name</label>
                                        <div class="position-relative icon-form-control">
                                            <i class="feather-user position-absolute"></i>
                                            <input required type="text" class="form-control" [(ngModel)]="user.prenom">
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div class="form-group">
                                <label class="mb-1">Email</label>
                                <div class="position-relative icon-form-control">
                                    <i class="feather-at-sign position-absolute"></i>
                                    <input required name="email" [(ngModel)]="email" type="email" class="form-control">
                                </div>
                            </div>
                            <div class="form-group">
                                <label class="mb-1">Password (6 or more characters)</label>
                                <div class="position-relative icon-form-control">
                                    <i class="fa position-absolute" [ngClass]="{
                             'fa-eye-slash': !fieldTextType,
                             'fa-eye': fieldTextType
                           }" (click)="toggleFieldTextType()"></i>
                                    <input required [(ngModel)]="password" [type]="fieldTextType ? 'text' : 'password'" name="pass" class="form-control">
                                </div>
                            </div>
                            <div class="form-group">
                                <label class="mb-1">Confirm password (6 or more characters)</label>
                                <div class="position-relative icon-form-control">
                                    <i class="fa position-absolute" [ngClass]="{
                           'fa-eye-slash': !repeatFieldTextType,
                           'fa-eye': repeatFieldTextType
                         }" (click)="toggleRepeatFieldTextType()"></i>
                                    <input required [(ngModel)]="confirmpassword" [type]="repeatFieldTextType ? 'text' : 'password'" name="pass" class="form-control">
                                </div>
                            </div>
                            <div class="d-flex justify-content-end">
                                <div class="flex-shrink-1">
                                    <button type="submit" [disabled]="!xpForm.form.valid" class="btn btn-outline-primary btn-sm mr-1">Next</button>
                                </div>
                            </div>
                        </form>
                        <form *ngIf="step === 2" #xpForm="ngForm" (ngSubmit)="signUp()">
                            <div>
                                <div class="form-group">
                                    <label class="mb-1">Date of Birth</label>
                                    <div class="position-relative icon-form-control">
                                        <i class="feather-calendar position-absolute"></i>
                                        <input required [(ngModel)]="user.dateNaissance" type="date" name="datenaissance" class="form-control">
                                    </div>
                                </div>
                                <div class="form-row">
                                    <div class="col">
                                        <div class="form-group">
                                            <label class="mb-1">Profession</label>
                                            <div class="position-relative icon-form-control">
                                                <i class="feather-briefcase position-absolute"></i>
                                                <input required type="text" [(ngModel)]="user.poste" type="text" name="poste" class="form-control">
                                            </div>
                                        </div>
                                    </div>
                                    <div class="col">
                                        <div class="form-group">
                                            <label class="mb-1">At</label>
                                            <div class="position-relative icon-form-control">
                                                <i class="feather-home position-absolute"></i>
                                                <input required type="text" [(ngModel)]="user.lieu" type="text" name="lieu" class="form-control">
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <div class="form-group">
                                    <label class="mb-1">Center of interest</label>
<<<<<<< HEAD
                                    <app-tags></app-tags>
=======
                                    <app-tags (tagsAdded)="addCenterOfInterest($event)" (tagsRemoved)="deleteCenterOfInterest($event)" ></app-tags>
>>>>>>> b5446b2a5deb6a99c0106b8227a23d0ad7d05dbe
                                </div>

                                <div>

                                </div>
                                <div class="d-flex justify-content-end">
                                    <div class="flex-shrink-1">
                                        <button type="button" (click)="back()" class="btn btn-outline-primary btn-sm mr-1">Previous</button>
                                    </div>
                                </div>
                                <div class="form-group" style="margin-top: 2%;">
                                    <label class="mb-1">You agree to the RichBlok <a href="#">User Agreement</a>, <a href="#">Privacy
                      Policy</a>, and <a href="#">Cookie Policy</a>.</label>
                                </div>
                            </div>

                            <button class="btn btn-primary btn-block text-uppercase" [disabled]="!xpForm.form.valid" type="submit">
                Agree & Join </button>

                        </form>
                        <div class="text-center mt-3 border-bottom pb-3">
                            <p class="small text-muted">Or login with</p>
                            <div class="row">
                                <div class="col-12">
                                    <button type="button" class="btn btn-sm btn-outline-instagram btn-block" (click)="loginWithGoogle()"><i class="fe-google"></i> Google</button>
                                </div>
                            </div>
                        </div>
                        <div class="py-3 d-flex align-item-center">
                            <a href="forgot-password">Forgot password?</a>
                            <span class="ml-auto"> Already on RichBlok? <a class="font-weight-bold" href="sign-in">Sign in</a></span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
