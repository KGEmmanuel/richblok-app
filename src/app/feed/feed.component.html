<app-header></app-header>
<div class="py-4" *ngIf="!detail">
    <div class="container">
        <div class="row">
            <!-- Main Content -->
            <main class="col col-xl-6 order-xl-2 col-lg-12 order-lg-1 col-md-12 col-sm-12 col-12">
                <div class="box shadow-sm border rounded bg-white mb-3 osahan-share-post">
                    <app-post-form></app-post-form>
                </div>
                <app-post-list></app-post-list>
            </main>
            <aside class="col col-xl-3 order-xl-1 col-lg-6 order-lg-2 col-md-6 col-sm-6 col-12">
                <app-user-card></app-user-card>
                <app-rib-solutions></app-rib-solutions>
                <app-connection-aside></app-connection-aside>
                <app-similar-pages></app-similar-pages>

            </aside>
            <aside class="col col-xl-3 order-xl-3 col-lg-6 order-lg-3 col-md-6 col-sm-6 col-12">

                <app-premium></app-premium>
                <app-demonstrate-suggestion></app-demonstrate-suggestion>
                <div class="box shadow-sm border rounded bg-white mb-3">
                    <div class="box-title border-bottom p-3">
                        <h6 class="m-0">Demonstration
                        </h6>
                    </div>
                    <div class="box-body p-3">

                    </div>
                </div>

                <app-job-aside></app-job-aside>
                <div class="adminActions">
                    <input type="checkbox" name="adminToggle" class="adminToggle" />
                    <a class="adminButton" tooltip="Messaging" href="#!"><i class="fa fa-sms" style="font-size: 2.5em;"></i></a>
                    <div class="adminButtons">
                        <a data-toggle="modal" data-target="#exampleModal" tooltip="Parfait Nzo">
                            <div class="dropdown-liist-image mr-3">
                                <img class="rounded-circle" src="../../assets/img/user-14.jpg">
                            </div>
                        </a>
                        <a data-toggle="modal" data-target="#exampleModal" tooltip="Cedrick Tokam">
                            <div class="dropdown-liist-image mr-3">
                                <img class="rounded-circle" src="../../assets/img/user-14.jpg">
                            </div>
                        </a>
                        <a data-toggle="modal" data-target="#exampleModal" tooltip="Emmanuel Kaldjog">
                            <div class="dropdown-liist-image mr-3">
                                <img class="rounded-circle" src="../../assets/img/user-14.jpg">
                            </div>
                        </a>
                        <a data-toggle="modal" data-target="#exampleModal" tooltip="Kamga Jaures">
                            <div class="dropdown-liist-image mr-3">
                                <img class="rounded-circle" src="../../assets/img/user-14.jpg">
                            </div>
                        </a>
                        <a data-toggle="modal" data-target="#exampleModal" tooltip="Create new chat"><i class="feather-plus" style="font-size:2em;"></i></a>
                    </div>
                </div>
            </aside>
        </div>
    </div>
</div>
<footer>
    <app-footer></app-footer>
</footer>
<div class="modal fade" id="exampleModal" tabindex="-1" role="dialog" aria-labelledby="exampleModalLabel" aria-hidden="true">
    <div class="modal-dialog" role="document">
        <div class="modal-content">
            <div class="modal-body">
                <span class="row">
          <span class="col-lg-6">
            <a routerLink="/messages"><h6>Open in messages</h6></a>
          </span>
                <span class="col-lg-6 d-flex justify-content-end">
            <i class="feather-x" data-dismiss="modal"></i>
          </span>
                </span>
                <hr>
                <span style="margin-top: -4% !important;">
          <app-chat-content></app-chat-content>
        </span>
            </div>
        </div>
    </div>
</div>
