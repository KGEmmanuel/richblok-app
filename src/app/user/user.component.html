<!-- D1 / V5 Sprint 2: chrome swapped; inner Bootstrap layout for D2. -->
<rb-app-shell active="profile" *ngIf="currentUser">
    <div class="container">
        <div class="row">
            <!-- Main Content -->
            <aside class="col col-xl-3 order-xl-1 col-lg-12 order-lg-1 col-12">
                <div class="box mb-3 shadow-sm border rounded bg-white profile-box text-center">
                    <div class="py-4 px-3 border-bottom">
                        <img [src]="currentUser?.imageprofil" class="img-fluid mt-2 rounded-circle" alt="Responsive image">
                        <h5 class="font-weight-bold text-dark mb-1 mt-4">{{currentUser?.nom}} {{currentUser?.prenom}}</h5>
                        <p class="mb-0 text-muted">{{currentUser?.poste}} at {{currentUser?.lieu}}</p>
                    </div>
                    <div class="d-flex">
                        <div class="col-6 border-right p-3">
                            <h6 class="font-weight-bold text-dark mb-1">{{currentUser?.abonnees?.length}}</h6>
                            <p class="mb-0 text-black-50 small">Connections</p>
                        </div>
                        <div class="col-6 p-3">
                            <h6 class="font-weight-bold text-dark mb-1">{{views}}</h6>
                            <p class="mb-0 text-black-50 small">Views</p>
                        </div>
                    </div>
                    <div class="overflow-hidden border-top">
                        <a class="font-weight-bold p-3 d-block" (click)="logout()" href=""> Log out </a>
                    </div>
                </div>
                <app-profile-completeness [user]="currentUser"></app-profile-completeness>
                <app-referral-widget [compact]="true"></app-referral-widget>
                <app-skills></app-skills>
                <app-rib-solutions></app-rib-solutions>

            </aside>

            <main class="col col-xl-6 order-xl-2 col-lg-12 order-lg-2 col-md-12 col-sm-12 col-12">
                <!-- D2: Bootstrap tabs migrated to ngbNav. -->
                <div class="box shadow-sm rounded bg-white mb-3 overflow-hidden">
                    <ul ngbNav #userNav="ngbNav" class="nav border-bottom osahan-line-tab">
                        <li [ngbNavItem]="'portfolio'">
                            <a ngbNavLink>Portfolio</a>
                            <ng-template ngbNavContent>
                                <app-user-portfolio></app-user-portfolio>
                            </ng-template>
                        </li>
                        <li [ngbNavItem]="'about'">
                            <a ngbNavLink>About</a>
                            <ng-template ngbNavContent>
                                <app-user-about></app-user-about>
                            </ng-template>
                        </li>
                        <li [ngbNavItem]="'real'">
                            <a ngbNavLink>Realisations</a>
                            <ng-template ngbNavContent>
                                <div class="box shadow-sm border rounded bg-white mb-3">
                                    <div class="box-title border-bottom p-3">
                                        <h6 class="m-0">Realisations</h6>
                                    </div>
                                    <app-realisation></app-realisation>
                                </div>
                            </ng-template>
                        </li>
                        <li [ngbNavItem]="'updates'">
                            <a ngbNavLink>Updates</a>
                            <ng-template ngbNavContent>
                                <app-user-post></app-user-post>
                            </ng-template>
                        </li>
                        <li [ngbNavItem]="'connections'">
                            <a ngbNavLink>Connections</a>
                            <ng-template ngbNavContent>
                                <app-user-friends></app-user-friends>
                            </ng-template>
                        </li>
                    </ul>
                </div>
                <div [ngbNavOutlet]="userNav"></div>

            </main>
            <aside class="col col-xl-3 order-xl-3 col-lg-12 order-lg-3 col-12">
                <button type="button" class="btn btn-lg btn-block btn-outline-gold mb-3" routerLink="/settings"> <i class="feather-settings"></i> Configure my profile</button>
                <app-user-links></app-user-links>
                <app-follow-orgs></app-follow-orgs>
                <app-similar-pages></app-similar-pages>
                <app-job-aside></app-job-aside>
            </aside>

        </div>
    </div>
</rb-app-shell>
