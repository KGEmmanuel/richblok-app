<div class="border">

    <form class="px-4 py-3" [formGroup]="expForm" (ngSubmit)="save()">
        <div class="form-group">
            <label for="exampleDropdownFormEmail1">Experience Name</label>
            <input type="text" [(ngModel)]="currentExperience.libelle" class="form-control" placeholder="Enter the name of your experience" formControlName="libelle" [ngClass]="{ 'is-invalid': submitted && f.libelle.errors }">
            <div *ngIf="submitted && f.libelle.errors" class="invalid-feedback">
                <div *ngIf="f.libelle.errors.required">Enter the name of your experience</div>
            </div>
        </div>
        <div class="form-group">
            <label for="exampleDropdownFormPassword1">Company of optension</label>
            <input required type="text" [(ngModel)]="currentExperience.entreprise" class="form-control" placeholder="Enter the company where you had you experience" formControlName="entreprise" [ngClass]="{ 'is-invalid': submitted && f.entreprise.errors }">
            <div *ngIf="submitted && f.entreprise.errors" class="invalid-feedback">
                <div *ngIf="f.entreprise.errors.required">Enter your company of obtension</div>
            </div>
        </div>
        <div class="form-group">
            <label for="exampleDropdownFormPassword1">Experience Type </label>
            <select required id="xpType" [(ngModel)]="currentExperience.typeExperience" class="form-control" formControlName="typeExperience" [ngClass]="{ 'is-invalid': submitted && f.typeExperience.errors }">
         <option [value]="'Job'"> Job </option>
         <option [value]="'Accademic Internship'"> Accademic Internship </option>
         <option [value]="'Accademic Internship'"> Professional Internship </option>
         <option [value]="'FreeLance'"> FreeLance </option>
      </select>
            <div *ngIf="submitted && f.typeExperience.errors" class="invalid-feedback">
                <div *ngIf="f.typeExperience.errors.required">Choose an experience type</div>
            </div>
        </div>
        <div class="form-group row">
            <div class="form-group col-lg-6">
                <label for="start">From</label>
                <input required type="date" [(ngModel)]="currentExperience.debut" id="start" class="form-control" formControlName="debut" [ngClass]="{ 'is-invalid': submitted && f.debut.errors }">
                <div *ngIf="submitted && f.debut.errors" class="invalid-feedback">
                    <div *ngIf="f.debut.errors.required">Enter the starting date</div>
                </div>
            </div>
            <div class="form-group col-lg-6" *ngIf="!currentOnIt">
                <label for="end">To</label>
                <input required type="date" [(ngModel)]="currentExperience.fin" class="form-control" id="end" formControlName="fin">

            </div>
        </div>
        <div class="form-check mb-3">

            <input type="checkbox" class="form-check-input" id="dropdownCheck" (change)="checkChanged($event)">
            <label class="form-check-label" for="dropdownCheck">
             Currently on it?
        </label>

        </div>
        <div class="form-group">
            <label for="xpDescription">Description</label>
            <textarea [(ngModel)]="currentExperience.description" placeholder="Describe your experience in few words" class="form-control" formControlName="description" [ngClass]="{ 'is-invalid': submitted && f.description.errors }"></textarea>
            <div *ngIf="submitted && f.description.errors" class="invalid-feedback">
                <div *ngIf="f.description.errors.required">Enter a description to your experience</div>
            </div>
        </div>

        <div class="d-flex justify-content-end">
            <button type="submit" class="btn btn-outline-primary btn-sm"> Save </button>
        </div>
    </form>
</div>
