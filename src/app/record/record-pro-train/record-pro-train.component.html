<div class="box shadow-sm border rounded bg-white mb-3">
    <div class="box-title border-bottom p-3">
        <h6 class="row">
            <span class="col-lg-6">
        <span *ngIf="!form">
          Trainings
        </span>
            <span *ngIf="form">
          Add a train
        </span>
            </span>
            <span class="ml-auto col-lg-6 d-flex justify-content-end">
        <button type="button" class="btn btn-light btn-sm" *ngIf="!form" (click)="showForm()"><i
            class="feather-plus"></i></button>
        <button type="button" class="btn btn-light btn-sm" *ngIf="form" (click)="hideForm()"><i
            class="feather-x"></i></button>

      </span>
        </h6>
        <div style="padding-top: 2% !important;">
            <app-record-pro-train-form *ngIf="form" [currentTraining]="currentTraining" (trainingSaved)="hideForm()"></app-record-pro-train-form>
        </div>
    </div>
    <div *ngIf="!form">
        <div *ngIf="allTrainings.length > 0">
            <div class="force-overflow">
                <app-record-pro-train-item *ngFor="let item of allTrainings" [currentItem]="item" (itemEdited)="dispEdit($event)"></app-record-pro-train-item>
            </div>
        </div>
        <div *ngIf="allTrainings.length === 0">
            <span class="d-flex justify-content-center" style="padding-top: 5%;">
      <img src="../../../assets/imgs/skill.png" style="width: 40%;">
    </span>
            <span class="d-flex justify-content-center" style="padding-top: 5%;">
      <h5>No train recorded. Click on the top right button to record one</h5>
    </span>
        </div>
    </div>

</div>
