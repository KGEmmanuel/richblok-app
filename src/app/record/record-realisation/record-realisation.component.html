<div class="box shadow-sm border rounded bg-white mb-3">
    <div class="box-title border-bottom p-3">
        <h6 class="row">
            <span class="col-lg-6">
        <span *ngIf="!form">
          Realisations
        </span>
            <span *ngIf="form">
          Add a realisation
        </span>
            </span>
            <span class="ml-auto col-lg-6 d-flex justify-content-end">
        <button type="button" class="btn btn-light btn-sm" *ngIf="!form" (click)="showForm()"><i
            class="feather-plus"></i></button>
        <button type="button" class="btn btn-light btn-sm" *ngIf="form" (click)="hideForm()"><i
            class="feather-x"></i></button>

      </span>
        </h6>
        <div style="padding-top: 2% !important;">
            <app-record-realisation-form *ngIf="form" [currentRealisation]="currentRealisation" (itemSaved)="hideForm()"></app-record-realisation-form>
        </div>
    </div>
    <div *ngIf="!form">
        <div id="style" class="row">
            <div class="col-lg-4" *ngFor="let item of realisation">
                <app-record-realisation-item [currentRealisation]="item" (selectForEdit)="edit($event)"></app-record-realisation-item>

            </div>
        </div>
        <div *ngIf="realisation.length === 0">
            <span class="d-flex justify-content-center" style="padding-top: 5%;">
  <img src="../../../assets/imgs/feed.png" style="width: 40%;">
  </span>
            <span class="d-flex justify-content-center" style="padding-top: 5%;">
  <h5>No realisation recorded. Click on the top right button to record one</h5>
  </span>
        </div>
    </div>
</div>
