<div class="box shadow-sm border rounded bg-white mb-3">
    <div class="box-title border-bottom p-3">
        <h6 class="row">
            <span class="col-lg-6">
        <span *ngIf="!form">
          Languages
        </span>
            <span *ngIf="form">
          Add a language
        </span>
            </span>
            <span class="ml-auto col-lg-6 d-flex justify-content-end">
         <button type="button" class="btn btn-light btn-sm" *ngIf="!form" (click)="showForm()"><i class="feather-plus"></i></button>
         <button type="button" class="btn btn-light btn-sm" *ngIf="form" (click)="hideForm()"><i class="feather-x"></i></button>

        </span>
        </h6>
        <div style="padding-top: 2% !important;">
            <app-record-languages-form *ngIf="form" [currentLang]="currentLang" (langSaved)="hideForm()"></app-record-languages-form>

        </div>
    </div>
    <div class="row d-flex justify-content-center" *ngIf="!form">
        <app-record-languages-item class="col-lg-4" *ngFor="let item of allLanguages" [currentItem]="item" (editItem)="edit($event)"></app-record-languages-item>
        <div *ngIf="!allLanguages || allLanguages?.length === 0">
            <span class="d-flex justify-content-center" style="padding-top: 5%;">
<img src="../../../assets/imgs/lang.png" style="width: 40%;">
</span>
            <span class="d-flex justify-content-center" style="padding-top: 5%;">
<h5>No langauge recorded. Click on the top right button to record one</h5>
</span>
        </div>
    </div>
</div>
