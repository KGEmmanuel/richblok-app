<div class="border">
    <form class="px-4 py-3" [formGroup]="lanForm" (ngSubmit)="save()">
        <div class="form-group">
            <label for="lgName">Language Name</label>
            <input type="text" required [(ngModel)]="currentLang.libele" class="form-control" id="lgName" placeholder="Enter the Language name" formControlName="libele" [ngClass]="{ 'is-invalid': submitted && f.libele.errors }">
            <div *ngIf="submitted && f.libele.errors" class="invalid-feedback">
                <div *ngIf="f.libele.errors.required">Enter the language name</div>
            </div>
        </div>
        <div class="row">
            <div class="form-group col-lg-4">
                <label for="spLvl">Speaking level</label>
                <select required [(ngModel)]="currentLang.niveauParle" type="text" class="form-control" id="spLvl" placeholder="Enter the company where you had you experience" formControlName="niveauParle" [ngClass]="{ 'is-invalid': submitted && f.niveauParle.errors }">
          <option [value]="'Beginner'">Beginner</option>
          <option [value]="'Elementary'">Elementary</option>
          <option [value]="'Pre-intermediate'">Pre-intermediate</option>
          <option [value]="'Intermediate'">Intermediate</option>
          <option [value]="'Upper-intermediate'">Upper-intermediate</option>
          <option [value]="'Advanced'">Advanced</option>
          <option [value]="'Proficient'">Proficient</option>
        </select>
                <div *ngIf="submitted && f.niveauParle.errors" class="invalid-feedback">
                    <div *ngIf="f.niveauParle.errors.required">Choose your speaking level</div>
                </div>
            </div>
            <div class="form-group col-lg-4">
                <label for="reLvl">Reading level</label>
                <select required [(ngModel)]="currentLang.niveauLu" type="text" class="form-control" id="reLvl" placeholder="Enter the company where you had you experience" formControlName="niveauLu" [ngClass]="{ 'is-invalid': submitted && f.niveauLu.errors }">
        <option [value]="'Beginner'">Beginner</option>
          <option [value]="'Elementary'">Elementary</option>
          <option [value]="'Pre-intermediate'">Pre-intermediate</option>
          <option [value]="'Intermediate'">Intermediate</option>
          <option [value]="'Upper-intermediate'">Upper-intermediate</option>
          <option [value]="'Advanced'">Advanced</option>
          <option [value]="'Proficient'">Proficient</option>
      </select>
                <div *ngIf="submitted && f.niveauLu.errors" class="invalid-feedback">
                    <div *ngIf="f.niveauLu.errors.required">Choose the reading level</div>
                </div>
            </div>
            <div class="form-group col-lg-4">
                <label for="wLvl">Writing level</label>
                <select required [(ngModel)]="currentLang.niveauEcrit" type="text" class="form-control" id="wLvl" placeholder="Enter the company where you had you experience" formControlName="niveauEcrit" [ngClass]="{ 'is-invalid': submitted && f.niveauEcrit.errors }">
          <option [value]="'Beginner'">Beginner</option>
          <option [value]="'Elementary'">Elementary</option>
          <option [value]="'Pre-intermediate'">Pre-intermediate</option>
          <option [value]="'Intermediate'">Intermediate</option>
          <option [value]="'Upper-intermediate'">Upper-intermediate</option>
          <option [value]="'Advanced'">Advanced</option>
          <option [value]="'Proficient'">Proficient</option>
        </select>
                <div *ngIf="submitted && f.niveauEcrit.errors" class="invalid-feedback">
                    <div *ngIf="f.niveauEcrit.errors.required">Choose your writing level</div>
                </div>
            </div>
        </div>


        <div class="d-flex justify-content-end">
            <button type="submit" class="btn btn-outline-primary btn-sm"> Save </button>

        </div>
    </form>
</div>
