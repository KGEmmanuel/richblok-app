<div class="border">
  <form class="px-4 py-3" #skillForm="ngForm" (ngSubmit)="save()">
    <div class="row">
      <div class="form-group col-lg-12">
        <label for="skillname" >Skill Name</label>
        <input type="text" required name="skillname" [(ngModel)]="currentSkill.skillName" class="form-control" id="skillname"
          placeholder="Enter the name of your skill">
      </div>
      <div class="form-group col-lg-6">
        <label for="level">Estimate you skill level</label>
        <select type="text" required name="level" [(ngModel)]="currentSkill.skillLevel" class="form-control"
          id="level" placeholder="Enter the company where you had you experience">
          <option [value]="'Beginner'">Beginner</option>
          <option [value]="'Elementary'">Elementary</option>
          <option [value]="'Pre-intermediate'">Pre-intermediate</option>
          <option [value]="'Intermediate'">Intermediate</option>
          <option [value]="'Upper-intermediate'">Upper-intermediate</option>
          <option [value]="'Advanced'">Advanced</option>
          <option [value]="'Proficient'">Proficient</option>
        </select>
      </div>
      <div class="form-group col-lg-6">
        <label for="duration">Your Experience of this skill (in months)</label>
        <input type="number" min="0" required name="duration" [(ngModel)]="currentSkill.skillduration" class="form-control" id="duration"
          placeholder="Experience of this skill">
        </div>
      </div>
      <div class="d-flex justify-content-end">
        <button type="submit" class="btn btn-outline-primary btn-sm" [disabled]="!skillForm.form.valid"> Save </button>
      </div>
  </form>
</div>
