<header>
  <app-header></app-header>
</header>

<!-- Week 4: unified wizard shell. The hero bar shows the current step's
     title; the step indicator below shows the full 5-step map with
     click-to-revisit for unlocked steps. -->
<div class="py-5 bg-primary">
  <div class="container">
    <div class="row">
      <div class="col-md-10 mx-auto">
        <h1 class="text-white font-weight-light">
          Offer a <span class="font-weight-bold">Job</span>
          <small class="text-white-50 ml-2" style="font-size: 0.5em;">
            Step {{ step }} of {{ steps.length }} &middot; {{ steps[step - 1]?.title }}
          </small>
        </h1>
        <p class="mb-2 text-white-50">{{ steps[step - 1]?.blurb }}</p>
      </div>
    </div>
  </div>
</div>

<!-- Step indicator strip -->
<div class="bg-white border-bottom shadow-sm">
  <div class="container py-3">
    <div class="d-flex justify-content-between align-items-center flex-wrap">
      <ng-container *ngFor="let s of steps">
        <div class="d-flex align-items-center mx-1 my-1"
             [class.text-primary]="stepIsCurrent(s.n)"
             [class.text-muted]="!stepUnlocked(s.n)"
             [style.cursor]="stepUnlocked(s.n) ? 'pointer' : 'not-allowed'"
             (click)="goToStep(s.n)">
          <span class="rounded-circle d-flex align-items-center justify-content-center mr-2"
                [class.bg-primary]="stepIsCurrent(s.n)"
                [class.text-white]="stepIsCurrent(s.n)"
                [class.border]="!stepIsCurrent(s.n)"
                style="width: 28px; height: 28px; font-weight: 600; font-size: 0.85em;">{{ s.n }}</span>
          <span class="small font-weight-bold">{{ s.title }}</span>
        </div>
        <span *ngIf="s.n < steps.length" class="text-muted d-none d-md-inline">&rsaquo;</span>
      </ng-container>
    </div>
  </div>
</div>

<!-- Step body. The 5 step components own their own forms + Firestore reads;
     the wizard just hosts them. Using *ngIf (not ngSwitch) to force remount
     on every step change so each step re-initializes cleanly. -->
<main>
  <div *ngIf="step === 1"><app-job-step1></app-job-step1></div>
  <div *ngIf="step === 2"><app-job-step2></app-job-step2></div>
  <div *ngIf="step === 3"><app-job-step3></app-job-step3></div>
  <div *ngIf="step === 4"><app-job-step4></app-job-step4></div>
  <div *ngIf="step === 5"><app-job-step5></app-job-step5></div>
</main>

<!-- Advance / close-step footer, rendered only for the currently-active step. -->
<div class="py-4" *ngIf="jobId && currentJob?.currentStep === step && step < 5">
  <div class="container">
    <div class="row">
      <div class="col-md-10 mx-auto">
        <button class="btn btn-primary btn-block text-uppercase" (click)="advance()">
          Close step {{ step }} &amp; continue
        </button>
      </div>
    </div>
  </div>
</div>

<footer>
  <app-footer></app-footer>
</footer>
