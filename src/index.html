<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Rib</title>
    <base href="/">

    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link href="https://maxcdn.bootstrapcdn.com/font-awesome/4.3.0/css/font-awesome.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.11.2/css/all.css">
    <link href="https://fonts.googleapis.com/css?family=Roboto:300,300i,400,400i,500,500i,700,700i,900" rel="stylesheet">
</head>
<style>
    h1,
    h2,
    h3,
    h4,
    h5,
    h6,
    p,
    div,
    section,
    span,
    label,
    input,
    datalist,
    textarea,
    select,
     ::placeholder,
    option,
    a,
    ol,
    li,
    ul,
    button {
        font-family: Roboto, "Roboto ", Georgia, serif !important;
    }
    
    .rb-loading-center {
        left: 50%;
        margin: 0 auto;
        position: absolute;
        top: 50%;
        transform: translate(-57%, -50%);
        z-index: 1;
    }
    
    .rb-loading-center>.nb-icon {
        width: 13vw !important;
    }
    
    .rb-loading-center>.nb-icon>img {
        height: 100% !important;
        width: 100% !important;
    }
    
    .rb-text-center-bottom {
        left: 50%;
        margin: 0 auto;
        position: absolute;
        top: 85%;
        transform: translate(-50%, -50%);
        z-index: 2;
    }
    
    .rb-text-center-bottom>.rb-text {
        width: 13vw !important
    }
    
    .rb-text-center-bottom>.rb-text>.rb-color {
        font-weight: bold;
        color: #fcfdfd !important;
    }
    
    .cs-loader {
        position: absolute;
        top: 0;
        left: 0;
        height: 100%;
        width: 100%;
    }
    
    .cs-loader-inner {
        transform: translateY(-50%);
        top: 50%;
        position: absolute;
        width: calc(100% - 200px);
        color: #FFF;
        padding: 0 100px;
        text-align: center;
    }
    
    .cs-loader-inner label {
        font-size: 20px;
        opacity: 0;
        display: inline-block;
    }
    
    @keyframes lol {
        0% {
            opacity: 0;
            transform: translateX(-300px);
        }
        33% {
            opacity: 1;
            transform: translateX(0px);
        }
        66% {
            opacity: 1;
            transform: translateX(0px);
        }
        100% {
            opacity: 0;
            transform: translateX(300px);
        }
    }
    
    @-webkit-keyframes lol {
        0% {
            opacity: 0;
            -webkit-transform: translateX(-300px);
        }
        33% {
            opacity: 1;
            -webkit-transform: translateX(0px);
        }
        66% {
            opacity: 1;
            -webkit-transform: translateX(0px);
        }
        100% {
            opacity: 0;
            -webkit-transform: translateX(300px);
        }
    }
    
    .cs-loader-inner label:nth-child(6) {
        -webkit-animation: lol 3s infinite ease-in-out;
        animation: lol 3s infinite ease-in-out;
    }
    
    .cs-loader-inner label:nth-child(5) {
        -webkit-animation: lol 3s 100ms infinite ease-in-out;
        animation: lol 3s 100ms infinite ease-in-out;
    }
    
    .cs-loader-inner label:nth-child(4) {
        -webkit-animation: lol 3s 200ms infinite ease-in-out;
        animation: lol 3s 200ms infinite ease-in-out;
    }
    
    .cs-loader-inner label:nth-child(3) {
        -webkit-animation: lol 3s 300ms infinite ease-in-out;
        animation: lol 3s 300ms infinite ease-in-out;
    }
    
    .cs-loader-inner label:nth-child(2) {
        -webkit-animation: lol 3s 400ms infinite ease-in-out;
        animation: lol 3s 400ms infinite ease-in-out;
    }
    
    .cs-loader-inner label:nth-child(1) {
        -webkit-animation: lol 3s 500ms infinite ease-in-out;
        animation: lol 3s 500ms infinite ease-in-out;
    }
</style>

<body>
    <app-root class="global">
        <div class="rb-loading-center d-flex justify-content-center" ">
      <div class="nb-icon ">
          <img src="assets/img/loading.png " alt="rb ">
      </div>
  </div>
  <div class="cs-loader d-flex justify-content-center " >
    <div class="cs-loader-inner " style="padding-top: 20% !important; ">
      <label>●</label>
      <label>●</label>
      <label>●</label>
      <label>●</label>
      <label>●</label>
      <label>●</label>
    </div>
  </div>
  <div class="rb-text-center-bottom d-flex justify-content-center "">
            <div class="rb-text">
                <h4 class="rb-color">By Richblok inc</h4>
            </div>
        </div>

	<div class="dash uno"></div>

	<div class="dash tres"></div>
	<div class="dash cuatro"></div>
  </div> -->
    </app-root>
