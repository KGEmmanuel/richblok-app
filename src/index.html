<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>RichBlok</title>
    <base href="/">

    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Connect or Create your RichBlok account so as to make records on your skills, tranings, experiences">
    <script type="application/ld+json">
        {
            "@context": "https://richblok.com",
            "@type": "Jobs",
            "name": "Party Coffee Cake",
            "author": {
                "@type": "Organisation",
                "name": "RichBlok Inc"
            },
            "datePublished": "23/05/2020",
            "description": "Hire fast and free talents with background checks",
        }
    </script>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="manifest" href="manifest.webmanifest">
    <meta name="theme-color" content="#1e88e5">

    <!-- Open Graph defaults (overridden per-page by SeoService) -->
    <meta property="og:title" content="RichBlok — Verified Skills, Hired Globally">
    <meta property="og:description" content="Get hired globally by proving your skills — not just listing them.">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="RichBlok">
    <meta name="twitter:card" content="summary_large_image">

    <!-- Meta Pixel (Facebook Ads) — activates when window.RB_META_PIXEL_ID is set -->
    <script>
      (function() {
        var pid = (window.RB_META_PIXEL_ID || '').trim();
        if (!pid) return;
        !function(f,b,e,v,n,t,s)
        {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
        n.callMethod.apply(n,arguments):n.queue.push(arguments)};
        if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
        n.queue=[];t=b.createElement(e);t.async=!0;
        t.src=v;s=b.getElementsByTagName(e)[0];
        s.parentNode.insertBefore(t,s)}(window, document,'script',
        'https://connect.facebook.net/en_US/fbevents.js');
        fbq('init', pid);
        fbq('track', 'PageView');
      })();
    </script>

    <!-- D1 / V5 Sprint 2: dropped the FA 5.11.2 CDN (~70KB). All 52 icon
         usages in src/app are `class="fa fa-*"` — FA4-compatible. FA4 stays
         until full lucide-angular migration (tracked in V5 Sprint 3). -->
    <link href="https://maxcdn.bootstrapcdn.com/font-awesome/4.3.0/css/font-awesome.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css?family=Roboto:300,300i,400,400i,500,500i,700,700i,900" rel="stylesheet">

    <!-- Modern startup typography: Inter Variable + JetBrains Mono for numbers -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
</head>
<style>
    .lds-ellipsis {
        display: inline-block;
        position: relative;
        width: 80px;
        height: 80px;
    }

    .lds-ellipsis div {
        position: absolute;
        top: 33px;
        width: 13px;
        height: 13px;
        border-radius: 50%;
        background: #fff;
        animation-timing-function: cubic-bezier(0, 1, 1, 0);
    }

    .lds-ellipsis div:nth-child(1) {
        left: 8px;
        animation: lds-ellipsis1 0.6s infinite;
    }

    .lds-ellipsis div:nth-child(2) {
        left: 8px;
        animation: lds-ellipsis2 0.6s infinite;
    }

    .lds-ellipsis div:nth-child(3) {
        left: 32px;
        animation: lds-ellipsis2 0.6s infinite;
    }

    .lds-ellipsis div:nth-child(4) {
        left: 56px;
        animation: lds-ellipsis3 0.6s infinite;
    }

    @keyframes lds-ellipsis1 {
        0% {
            transform: scale(0);
        }
        100% {
            transform: scale(1);
        }
    }

    @keyframes lds-ellipsis3 {
        0% {
            transform: scale(1);
        }
        100% {
            transform: scale(0);
        }
    }

    @keyframes lds-ellipsis2 {
        0% {
            transform: translate(0, 0);
        }
        100% {
            transform: translate(24px, 0);
        }
    }
</style>

<body>
    <app-root class="global">
        <div style="margin-top: 20% !important;">
            <div class="d-flex justify-content-center">
                <img src="assets/img/loading.png " alt="RichBlok" style="width: 15% !important">
            </div>
            <div class="d-flex justify-content-center">
                <div class="lds-ellipsis">
                    <div></div>
                    <div></div>
                    <div></div>
                    <div></div>
                </div>
            </div>
        </div>

    </app-root>
    <!-- D1 / V5 Sprint 2 cleanup:
         - Dropped jQuery 3.2.1 slim (was overwritten by 3.3.1 on the next
           line anyway — dead weight, ~70KB wasted).
         - Dropped peerjs@1.0.0 (zero usages across src/, was ~50KB + 1 request).
         - Dropped easypiechart (only self-referenced, ~15KB).
         - Dropped range.js (only self-referenced, ~6KB).
         - Kept jQuery 3.3.1 + popper + bootstrap.min.js — still required
           for the 281 `data-toggle`/`data-dismiss` bootstrap interactions
           (modals, dropdowns, tabs) across legacy components. These go
           when V5 Sprint 3 finishes the Bootstrap kill.
         Net: ~141KB JS dropped, zero functional regressions expected. -->
    <script src="https://code.jquery.com/jquery-3.3.1.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.12.9/umd/popper.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/js/bootstrap.min.js"></script>
</body>

</html>
